<!DOCTYPE html>
<html lang="es">

<head>

    <title>Contacto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <header id="auto-baner">
        <nav class="row">
            <div class="col">
                <h1><img src="../img/logo.jpg" alt="logo" width="80" id="logo">Contacto</h1>
            </div>
            <div class="col">
                <ul class="row align-items-start">
                    <li class="col"><a href="../index.html" type="button" class="btn btn-success">Home</a></li>
                    <li class="col"><a href="servicios.html" type="button" class="btn btn-success">Servicios</a></li>
                    <li class="col"><a href="galeria.html" type="button" class="btn btn-success">Galeria</a></li>
                    <li class="col"><a href="contacto.html" type="button" class="btn btn-success">Contacto</a></li>
                </ul>
            </div>
        </nav>


    </header>
    <main>
        <section class="formulario">
            <div class="wrapper">
                <div class="header">
                    <h1 id="titulox">Hablemos.</h1>
                    <p id="ptit">Completá el formulario y te responderemos a la brevedad.</p>
                </div>

                <div class="card form">
                    <div class="field">
                        <label for="nombre">Nombre y Apellido</label> <br>
                        <input id="nombre" type="text" placeholder="Nombre Completo" />
                    </div>

                    <div class="field">
                        <label for="telefono">Número de Teléfono</label><br>
                        <input id="telefono" type="tel" placeholder="+54 9 11 1234-5678" />
                    </div>

                    <div class="field">
                        <label for="email">Email</label><br>
                        <input id="email" type="email" placeholder="email@ejemplo.com" />
                    </div>

                    <div class="field">
                        <label for="comentarios"></label><br>
                        <textarea id="comentarios" placeholder="Comentarios..."></textarea>
                    </div>

                    <button class="btn btn-success btn-sm" type="submit" onclick="enviarContacto()">Enviar
                        mensaje</button>
                </div>
            </div>
        </section>
    </main>
    <footer>

        <ul>
            <li>Todos los derechos reservados CopyRight 2026</li>
            <li>Web creada por Luana</li>
            <a href="https://github.com/LuanaOstemberg" target="_blank">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://wa.me/549XXXXXXXXXX" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </ul>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../javascript/script.js"></script>
</body>

</html>
